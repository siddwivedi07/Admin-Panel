name: DAMS Selenium CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Install Chrome (required for Selenium on ubuntu-latest) ───────────
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      # ── 4. Switch to headless mode for CI ────────────────────────────────────
      - name: Set headless=true for CI
        run: sed -i 's/headless=false/headless=true/' src/main/resources/config.properties

      # ── 5. Run Selenium Tests ────────────────────────────────────────────────
      - name: Run Selenium Tests
        run: mvn clean test -B

      # ── 6. Upload Reports ────────────────────────────────────────────────────
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAMS-Reports-${{ github.run_number }}
          path: test-output/
          retention-days: 30
