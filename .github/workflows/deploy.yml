name: DAMS Selenium CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Install Google Chrome ─────────────────────────────────────────────
      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Set headless=true for CI
        run: |
          CONFIG=src/main/resources/config.properties
          if [ ! -f "$CONFIG" ]; then
            echo "ERROR: $CONFIG not found. Workspace contents:"
            find . -name "*.properties" | head -20
            exit 1
          fi
          sed -i 's/headless=false/headless=true/' "$CONFIG"
          echo "Updated config:"
          cat "$CONFIG"

      # ── 5. Run Selenium Tests ────────────────────────────────────────────────
      - name: Run Selenium Tests
        run: mvn clean test -B

      # ── 6. Create test-output dir if tests skipped/aborted ───────────────────
      - name: Ensure report directory exists
        if: always()
        run: mkdir -p test-output/reports test-output/screenshots test-output/logs

      # ── 7. Upload Reports ────────────────────────────────────────────────────
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAMS-Reports-${{ github.run_number }}
          path: test-output/
          retention-days: 30
          if-no-files-found: warn
