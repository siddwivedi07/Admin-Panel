name: DAMS Selenium Test

on:
  push:
    branches:
      - main  
  workflow_dispatch:         
env:
jobs:
  run-selenium-test:
    name: Run Selenium Test (main)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget gnupg2 unzip curl
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg

      - name: Build & Run Selenium Tests
        run: mvn clean test --no-transfer-progress
      
      - name: Upload DAMS Test Artifact
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: dams-selenium-artifact
          path: |
            target/surefire-reports/
            target/*.jar
            screenshots/
          retention-days: 30
