name: DAMS Selenium CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set headless=true for CI
        run: sed -i 's/headless=false/headless=true/' src/main/resources/config.properties

      - name: Run Selenium Tests
        run: mvn clean test -B

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DAMS-Reports-${{ github.run_number }}
          path: test-output/
          retention-days: 30
