name: DAMS Selenium CI — Login + OTP

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:        # Manual run from GitHub Actions tab

# ── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  selenium-login-otp:
    name: Selenium Tests (Chrome Headless)
    runs-on: ubuntu-latest

    steps:

      # 1 ── Checkout code ───────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2 ── Java 11 ─────────────────────────────────────────────────────────
      - name: ☕ Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # 3 ── Chrome ──────────────────────────────────────────────────────────
      - name: 🌐 Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      # 4 ── Force headless for CI ───────────────────────────────────────────
      - name: ⚙️ Set headless=true for CI run
        run: |
          sed -i 's/^headless=.*/headless=true/' \
            src/main/resources/config.properties
          echo "Updated config:"
          cat src/main/resources/config.properties

      # 5 ── Run tests ───────────────────────────────────────────────────────
      - name: 🧪 Build & Execute Selenium Tests
        run: mvn clean test -B

      # 6 ── Publish ExtentReports HTML ──────────────────────────────────────
      - name: 📊 Upload HTML Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-html-report
          path: test-output/reports/
          retention-days: 14

      # 7 ── Upload screenshots (failure only) ───────────────────────────────
      - name: 📸 Upload Failure Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots
          path: test-output/screenshots/
          retention-days: 7

      # 8 ── Upload log file ─────────────────────────────────────────────────
      - name: 📋 Upload Test Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs
          path: test-output/logs/
          retention-days: 7

      # 9 ── Publish TestNG results to GitHub Checks ─────────────────────────
      - name: 📝 Publish TestNG Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: TestNG Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false
